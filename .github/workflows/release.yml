name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.CI_TOKEN }}

  upload-assets:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release artifact (zip)
        run: |
          set -euo pipefail
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          RELEASE_NAME="MarkdownToFields-${VERSION}"
          RELEASE_DIR="${RELEASE_NAME}"

          mkdir -p "$RELEASE_DIR"

          # Copy repository while excluding development-only files and CI metadata
          rsync -av --exclude=.git --exclude=.github --exclude=.vscode --exclude=tests --exclude=.env --exclude='*.log' --exclude=vendor --exclude=.ddev . "$RELEASE_DIR/"

          zip -r "${RELEASE_NAME}.zip" "$RELEASE_DIR"

          # Clean up temp dir
          rm -rf "$RELEASE_DIR"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: MarkdownToFields-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN }}
